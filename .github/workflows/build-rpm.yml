name: Build RPM

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    # Build inside Fedora so the spec's Fedora-specific macros
    # (systemd-rpm-macros, %{_udevrulesdir}, dnf) are available.
    container: fedora:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            git \
            make \
            tar \
            rpm-build \
            rpmdevtools \
            systemd-rpm-macros \
            nodejs
          # nodejs is required by the JavaScript-based actions
          # (checkout, upload-artifact) when the job runs in a custom
          # container image that does not already ship a Node.js runtime.

      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Mark checkout as a safe git directory
        # The container runs as a different user than the checkout owner,
        # so git refuses to operate on it until it is marked safe. The
        # Makefile's rpm target shells out to `git ls-files`, so this is
        # required for the tarball to be assembled.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build RPM
        run: make rpm

      - name: Collect built RPMs
        run: |
          mkdir -p dist
          cp "$HOME"/rpmbuild/RPMS/noarch/*.rpm dist/
          ls -l dist/

      - name: Upload RPM artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: keylights-tray-rpm
          path: dist/*.rpm
          if-no-files-found: error
